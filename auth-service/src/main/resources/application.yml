spring:
  application:
    name: auth-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/auth_db}
    username: ${SPRING_DATASOURCE_USERNAME:usher}
    password: ${SPRING_DATASOURCE_PASSWORD:usher}
  jpa:
    hibernate:
      ddl-auto: validate
  liquibase:
    change-log: classpath:db/changelog/changelog-master.yaml

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

auth:
  jwt:
    secret: ${AUTH_JWT_SECRET:usher-local-development-secret-must-be-at-least-32-bytes}
    expires-in-seconds: ${AUTH_JWT_EXPIRES_IN_SECONDS:900}
  refresh-token:
    expires-in-seconds: ${AUTH_REFRESH_TOKEN_EXPIRES_IN_SECONDS:604800}
