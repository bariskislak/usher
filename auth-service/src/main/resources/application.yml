spring:
  application:
    name: auth-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/auth_db}
    username: ${SPRING_DATASOURCE_USERNAME:usher}
    password: ${SPRING_DATASOURCE_PASSWORD:usher}
  liquibase:
    change-log: classpath:db/changelog/changelog-master.yaml

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
